<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultant | Thinking Partner</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #888888;
            --padding-edge: 4rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Keeps the "anchored" feel */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: var(--padding-edge);
        }

        /* Anchored Elements */
        .anchor {
            position: absolute;
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.05rem;
            text-transform: lowercase;
        }

        .name {
            top: var(--padding-edge);
            left: var(--padding-edge);
        }

        .email {
            bottom: var(--padding-edge);
            left: var(--padding-edge);
            color: var(--text-main);
            text-decoration: none;
        }

        /* Main Content Area */
        main {
            display: grid;
            grid-template-columns: 1.2fr 1fr; /* Asymmetric balance */
            align-items: center;
            gap: 4rem;
            max-width: 1100px;
            margin-left: 5%; /* Shifts slightly left of center */
        }

        .text-block {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: -0.02em;
        }

        .quote {
            margin-top: 1.5rem;
            font-size: 1rem;
            color: var(--text-muted);
            font-style: italic;
            font-weight: 300;
        }

        .attribution {
            display: block;
            margin-top: 0.25rem;
            font-size: 0.8rem;
            font-style: normal;
            letter-spacing: 0.02em;
        }

        /* Photo Styles */
        .photo-container {
            justify-self: start;
        }

        .photo-container img {
            max-width: 100%;
            height: auto;
            filter: grayscale(100%); /* Keeps it understated */
            opacity: 0.9;
            /* Placeholder styling if no image exists yet */
            background-color: #f0f0f0;
            display: block;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            body {
                padding: 2rem;
                overflow: auto;
            }
            main {
                grid-template-columns: 1fr;
                margin-left: 0;
                gap: 2rem;
            }
            .name, .email {
                position: static;
                margin-bottom: 2rem;
            }
            .email {
                margin-top: 4rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="anchor name">[Name]</div>

    <main>
        <div class="text-block">
            <h1>You're solving the wrong problem.</h1>
            <h1>We'll find the right one.</h1>
            
            <div class="quote">
                "The best thinking partner..."
                <span class="attribution">— Startup founder</span>
            </div>
        </div>

        <div class="photo-container">
            <img src="photo.jpg" alt="Portrait" width="400" height="500">
        </div>
    </main>

    <a href="mailto:email@example.com" class="anchor email">email@example.com</a>

</body>
</html>
